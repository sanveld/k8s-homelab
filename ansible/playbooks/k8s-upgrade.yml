---
# Kubernetes version upgrade following kubeadm upgrade procedure.
# Upgrades control plane first, then workers — one node at a time.
# kubectl commands run locally using ~/.kube/config-homelab.
#
# Usage:
#   ansible-playbook playbooks/k8s-upgrade.yml -e k8s_version=1.31.4
#
# Ref: https://kubernetes.io/docs/tasks/administer-cluster/kubeadm/kubeadm-upgrade/

- name: Upgrade control plane
  hosts: control_plane
  serial: 1
  vars:
    k8s_version: ""
  pre_tasks:
    - name: Validate k8s_version is set
      ansible.builtin.fail:
        msg: "Set target version with -e k8s_version=1.31.4"
      when: k8s_version == ""

  tasks:
    - name: Unhold kubeadm
      ansible.builtin.dpkg_selections:
        name: kubeadm
        selection: install

    - name: Upgrade kubeadm
      ansible.builtin.apt:
        name: "kubeadm={{ k8s_version }}-*"
        state: present
        update_cache: true

    - name: Hold kubeadm
      ansible.builtin.dpkg_selections:
        name: kubeadm
        selection: hold

    - name: Verify kubeadm version
      ansible.builtin.command:
        cmd: kubeadm version -o short
      changed_when: false
      register: kubeadm_ver

    - name: Print kubeadm version
      ansible.builtin.debug:
        msg: "kubeadm is now {{ kubeadm_ver.stdout }}"

    - name: Run kubeadm upgrade plan
      ansible.builtin.command:
        cmd: kubeadm upgrade plan
      changed_when: false
      register: upgrade_plan

    - name: Print upgrade plan
      ansible.builtin.debug:
        msg: "{{ upgrade_plan.stdout_lines }}"

    - name: Apply kubeadm upgrade
      ansible.builtin.command:
        cmd: "kubeadm upgrade apply v{{ k8s_version }} --yes"
      changed_when: true

    - name: Drain control plane node
      delegate_to: localhost
      become: false
      ansible.builtin.command:
        cmd: >
          kubectl drain {{ inventory_hostname }}
          --ignore-daemonsets
          --delete-emptydir-data
          --force
          --timeout=120s
      changed_when: true

    - name: Unhold kubelet and kubectl
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: install
      loop:
        - kubelet
        - kubectl

    - name: Upgrade kubelet and kubectl
      ansible.builtin.apt:
        name:
          - "kubelet={{ k8s_version }}-*"
          - "kubectl={{ k8s_version }}-*"
        state: present
        update_cache: true

    - name: Hold kubelet and kubectl
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubectl

    - name: Restart kubelet
      ansible.builtin.systemd:
        name: kubelet
        daemon_reload: true
        state: restarted

    - name: Wait for node to be Ready
      delegate_to: localhost
      become: false
      ansible.builtin.command:
        cmd: >
          kubectl wait node/{{ inventory_hostname }}
          --for=condition=Ready
          --timeout=120s
      changed_when: false
      retries: 5
      delay: 10
      register: node_ready
      until: node_ready.rc == 0

    - name: Uncordon control plane node
      delegate_to: localhost
      become: false
      ansible.builtin.command:
        cmd: >
          kubectl uncordon {{ inventory_hostname }}
      changed_when: true

- name: Upgrade worker nodes
  hosts: workers
  serial: 1
  vars:
    k8s_version: ""
  tasks:
    - name: Unhold kubeadm
      ansible.builtin.dpkg_selections:
        name: kubeadm
        selection: install

    - name: Upgrade kubeadm
      ansible.builtin.apt:
        name: "kubeadm={{ k8s_version }}-*"
        state: present
        update_cache: true

    - name: Hold kubeadm
      ansible.builtin.dpkg_selections:
        name: kubeadm
        selection: hold

    - name: Run kubeadm upgrade node
      ansible.builtin.command:
        cmd: kubeadm upgrade node
      changed_when: true

    - name: Drain worker node
      delegate_to: localhost
      become: false
      ansible.builtin.command:
        cmd: >
          kubectl drain {{ inventory_hostname }}
          --ignore-daemonsets
          --delete-emptydir-data
          --force
          --timeout=120s
      changed_when: true

    - name: Unhold kubelet and kubectl
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: install
      loop:
        - kubelet
        - kubectl

    - name: Upgrade kubelet and kubectl
      ansible.builtin.apt:
        name:
          - "kubelet={{ k8s_version }}-*"
          - "kubectl={{ k8s_version }}-*"
        state: present
        update_cache: true

    - name: Hold kubelet and kubectl
      ansible.builtin.dpkg_selections:
        name: "{{ item }}"
        selection: hold
      loop:
        - kubelet
        - kubectl

    - name: Restart kubelet
      ansible.builtin.systemd:
        name: kubelet
        daemon_reload: true
        state: restarted

    - name: Wait for node to be Ready
      delegate_to: localhost
      become: false
      ansible.builtin.command:
        cmd: >
          kubectl wait node/{{ inventory_hostname }}
          --for=condition=Ready
          --timeout=120s
      changed_when: false
      retries: 5
      delay: 10
      register: node_ready
      until: node_ready.rc == 0

    - name: Uncordon worker node
      delegate_to: localhost
      become: false
      ansible.builtin.command:
        cmd: >
          kubectl uncordon {{ inventory_hostname }}
      changed_when: true
